<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>JS Завдання</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <button class="tab active" onclick="show(0)">Завдання 1 — Drag & Drop</button>
    <button class="tab" onclick="show(1)">Завдання 2 — Піца</button>
</div>

<!-- Завдання 1 -->
<div class="panel active" id="panel0">
    <h2>Перетягуй блоки</h2>
    <div id="area">
        <div class="box" style="left:20px;top:20px;background:#4CAF50">Блок 1</div>
        <div class="box" style="left:160px;top:60px;background:#2196F3">Блок 2</div>
        <div class="box" style="left:300px;top:20px;background:#f44336">Блок 3</div>
        <div class="box" style="left:80px;top:180px;background:#FF9800">Блок 4</div>
    </div>
</div>

<!-- Завдання 2 -->
<div class="panel" id="panel1">
    <h2>Замовлення піци</h2>
    <div id="list"></div>
    <button onclick="addPizza()">+ Додати ще одну піцу</button>
    <button onclick="order()">Замовити</button>
    <p id="msg"></p>
</div>

<script src="script.js"></script>
</body>
</html>
